openapi: 3.0.3
info:
  title: AI Adaptive Learning Platform API
  version: 1.0.0
servers:
  - url: /api/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, fieldErrors]
          properties:
            code:
              type: string
            message:
              type: string
            fieldErrors:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  message: { type: string }
    RegisterRequest:
      type: object
      required: [email, password, role]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        role: { type: string, enum: [student, teacher, admin] }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string, example: bearer }
    Topic:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
    ProgressResponse:
      type: object
      properties:
        user_id: { type: integer }
        mastery_scores:
          type: array
          items:
            type: object
            properties:
              topic_id: { type: integer }
              score: { type: integer }
              ability: { type: number }
paths:
  /auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
  /users/me:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Current user }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /topics:
    get:
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Paginated topics
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Topic' }
                  total: { type: integer }
  /questions:
    post:
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }
  /exams:
    post:
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }
  /exams/{id}/submit:
    post:
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Submitted }
  /progress:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Progress data
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProgressResponse' }
  /ai/chat:
    post:
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Chat response }
  /ai/agent:
    post:
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Agent response }
